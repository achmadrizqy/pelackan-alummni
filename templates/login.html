{% extends "base.html" %}
{% block title %}Login — Sistem Pelacakan Alumni{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="width:56px;height:56px;border-radius:14px;background:#2563eb;display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.75rem;">
                <i class="fas fa-graduation-cap text-white fs-4"></i>
            </div>
            <h2 class="fw-bold" style="font-size:1.4rem;">Sistem Pelacakan Alumni</h2>
            <p class="text-muted" style="font-size:0.875rem;">Silakan login untuk mengakses sistem</p>
        </div>

        <div class="card">
            <div class="card-body">
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f8fafc;border-right:none;">
                                <i class="fas fa-user text-muted" style="font-size:0.8rem;"></i>
                            </span>
                            <input type="text" name="username" id="username"
                                   class="form-control" style="border-left:none;"
                                   placeholder="Masukkan username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:#f8fafc;border-right:none;">
                                <i class="fas fa-lock text-muted" style="font-size:0.8rem;"></i>
                            </span>
                            <input type="password" name="password" id="password"
                                   class="form-control" style="border-left:none;"
                                   placeholder="Masukkan password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center mt-3 text-muted" style="font-size:0.78rem;">
            Default: username <code>user</code> / password <code>user</code>
        </p>
    </div>
</div>
{% endblock %}
